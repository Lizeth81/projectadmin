<div class="formContenido">
    <div>
        <h3 class="textUser">REGISTRO DE USURIO</h3>
    </div>
    <form nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()">
        <!--Usuario-->
        <nz-form-item>
            <nz-form-label [nzSpan]="7" nzRequired>Nombre</nz-form-label>
            <nz-form-control [nzSpan]="12" nzHasFeedback nzValidatingTip="Validating..." [nzErrorTip]="userErrorTpl">
                <input nz-input formControlName="userName" />
                <ng-template #userErrorTpl let-control>
                    <ng-container *ngIf="control.hasError('required')">¡Por favor ingresar el nombre del usuario!</ng-container>
                </ng-template>
            </nz-form-control>
        </nz-form-item>
        <!--Correo electronico-->
        <nz-form-item>
            <nz-form-label [nzSpan]="7" nzRequired>E-mail</nz-form-label>
            <nz-form-control [nzSpan]="12" nzHasFeedback [nzErrorTip]="emailErrorTpl">
                <input nz-input formControlName="email" type="email" />
                <ng-template #emailErrorTpl let-control>
                    <ng-container *ngIf="control.hasError('email')">¡Por favor ingrese un correo electronico valido!</ng-container>
                </ng-template>
            </nz-form-control>
        </nz-form-item>
        <!--Contraseña-->
        <nz-form-item>
            <nz-form-label [nzSpan]="7" nzRequired>Contraseña</nz-form-label>
            <nz-form-control [nzSpan]="12" nzHasFeedback nzErrorTip="¡Por favor ingrese una contraseña!">
                <input nz-input type="password" formControlName="password" (ngModelChange)="validateConfirmPassword()" />
            </nz-form-control>
        </nz-form-item>
        <!--Confirmar contraseña-->
        <nz-form-item>
            <nz-form-label [nzSpan]="7" nzRequired>Confirmar contraseña</nz-form-label>
            <nz-form-control [nzSpan]="12" nzHasFeedback [nzErrorTip]="passwordErrorTpl">
                <input nz-input type="password" formControlName="confirm" />
                <ng-template #passwordErrorTpl let-control>
                    <ng-container *ngIf="control.hasError('required')">Please confirm your password!</ng-container>
                    <ng-container *ngIf="control.hasError('confirm')">Password is inconsistent!</ng-container>
                </ng-template>
            </nz-form-control>
        </nz-form-item>
        <!--Nombre del proyecto-->
        <nz-form-item>
            <nz-form-label [nzSpan]="7" nzRequired>Nombre del proyecto</nz-form-label>
            <nz-form-control [nzSpan]="12" nzHasFeedback nzErrorTip="¡Por favor ingresar el nombre del proyecto de grado!">
                <nz-textarea-count [nzMaxCharacterCount]="2000">
                    <textarea formControlName="NameProject" nz-input rows="2"></textarea>
                </nz-textarea-count>
            </nz-form-control>
        </nz-form-item>
        <nz-form-item>
            <nz-form-control [nzOffset]="7" [nzSpan]="12">
                <button nz-button nzType="primary" [disabled]="!validateForm.valid">Registrar Usuario</button>
                <button nz-button (click)="resetForm($event)">Cancelar</button>
            </nz-form-control>
        </nz-form-item>
    </form>
</div>
