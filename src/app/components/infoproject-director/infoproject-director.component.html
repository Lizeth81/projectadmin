<div class="formContenido">
    <div>
        <h3 class="from-tittle">NOMBRE DEL PROYECTO</h3>
        <hr>
        <br>
    </div>
<div>
    <h3>Información básica del proyecto:</h3>
</div>
    
    <div class="columna">
        <div  nz-row [nzGutter]="8">
          <div class="primera" nz-col [nzSpan]="12">
            <form nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()">
                <nz-form-item>
                  <nz-form-label>Codigo del proyecto</nz-form-label>
                  <input nz-input id="email" class="registroproyecto"/>
                 
                </nz-form-item>
          
                <nz-form-item>
                  <nz-form-label [nzSm]="6" [nzXs]="24" nzRequired nzFor="email">Titulo del proyecto</nz-form-label>
                  <nz-form-control [nzSm]="14" [nzXs]="24" nzErrorTip="The input is not valid E-mail!">
                    <input nz-input formControlName="email" id="email" class="registroproyecto"/>
                  </nz-form-control>
                </nz-form-item>
                
          
                <nz-form-item>
                  <nz-form-label [nzSm]="6" [nzXs]="24" nzFor="website" nzRequired>Fecha</nz-form-label>
                  <nz-form-control [nzSm]="14" [nzXs]="24">
                    <input nz-input id="website" formControlName="website" placeholder="Fecha de creación del proyecto" class="registroproyecto"/>
                  </nz-form-control>
                </nz-form-item>
          
                <nz-form-item>
                  <nz-form-label [nzSm]="6" [nzXs]="24" nzFor="password" nzRequired>Password</nz-form-label>
                  <nz-form-control [nzSm]="14" [nzXs]="24" nzErrorTip="Please input your password!">
                    <input
                      nz-input
                      type="password"
                      id="password"
                      formControlName="password"
                      (ngModelChange)="updateConfirmValidator()" class="registroproyecto"
                    />
                  </nz-form-control>
                </nz-form-item>
                </form>

          </div>
          <div class="segunda" nz-col [nzSpan]="12">
            <form nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()">
            <nz-form-item>
                <nz-form-label [nzSm]="6" [nzXs]="24" nzFor="checkPassword" nzRequired>Confirm Password</nz-form-label>
                <nz-form-control [nzSm]="14" [nzXs]="24" [nzErrorTip]="errorTpl">
                  <input nz-input type="password" formControlName="checkPassword" id="checkPassword" class="registroproyecto"/>
                  <ng-template #errorTpl let-control>
                    <ng-container *ngIf="control.hasError('required')">Please confirm your password!</ng-container>
                    <ng-container *ngIf="control.hasError('confirm')">
                      Two passwords that you enter is inconsistent!
                    </ng-container>
                  </ng-template>
                </nz-form-control>
              </nz-form-item>

              <nz-form-item>
                <nz-form-label [nzSm]="6" [nzXs]="24" nzFor="password" nzRequired>Password</nz-form-label>
                <nz-form-control [nzSm]="14" [nzXs]="24" nzErrorTip="Please input your password!">
                  <input
                    nz-input
                    type="password"
                    id="password"
                    formControlName="password"
                    (ngModelChange)="updateConfirmValidator()" class="registroproyecto"
                  />
                </nz-form-control>
              </nz-form-item>

              <nz-form-item>
                <nz-form-label [nzSm]="6" [nzXs]="24" nzFor="password" nzRequired>Password</nz-form-label>
                <nz-form-control [nzSm]="14" [nzXs]="24" nzErrorTip="Please input your password!">
                  <input
                    nz-input
                    type="password"
                    id="password"
                    formControlName="password"
                    (ngModelChange)="updateConfirmValidator()" class="registroproyecto"
                  />
                </nz-form-control>
              </nz-form-item>
            </form>
        

            </div>
        </div>
    </div>
</div>
