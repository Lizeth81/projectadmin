<div class="form-background">
    <div>
        <img class="logo-img" src="../assets/logo-udes.png">
    </div>
    <div class="form-contenido">
        <form nz-form [formGroup]="validateForm" class="login-form" (ngSubmit)="submitForm()">
            <div>
                <H3 class="title-login">INICIAR SESIÓN</H3>
            </div>
            <nz-form-item>
                <nz-form-control nzErrorTip="¡Por favor ingrese su usuario!">
                    <nz-input-group nzPrefixIcon="user">
                        <input type="text" nz-input formControlName="userName" placeholder="Usuario" />
                    </nz-input-group>
                </nz-form-control>
            </nz-form-item>
            <nz-form-item>
                <nz-form-control nzErrorTip="¡Por favor ingrese su contraseña!">
                    <nz-input-group nzPrefixIcon="lock">
                        <input type="password" nz-input formControlName="password" placeholder="Contraseña" />
                    </nz-input-group>
                </nz-form-control>
            </nz-form-item>
            <button nz-button class="login-form-button login-form-margin" [nzType]="'primary'">Aceptar</button>
            <a>Restablecer contraseña</a>
        </form>
    </div>
</div>
