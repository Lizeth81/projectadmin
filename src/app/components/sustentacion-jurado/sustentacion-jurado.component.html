<div class="formContenido">
    <div>
        <h3 class="from-tittle">NOMBRE DEL PROYECTO</h3>
        <hr>
        <br>
    </div>
    <nz-divider nzText="Información básica del proyecto" nzOrientation="left"></nz-divider>
    
    <div class="columna">
        <div  nz-row [nzGutter]="8">
          <div class="primera" nz-col [nzSpan]="12">
            <form nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()">
                <nz-form-item>
                    <nz-form-label [nzSm]="6" [nzXs]="24">Fecha</nz-form-label>
                    <nz-form-control [nzSm]="14" [nzXs]="24" >
                    <input nz-input [disabled]="true" id="email" class="registroproyecto"/>
                  </nz-form-control>
                  </nz-form-item>
        
                <nz-form-item>
                    <nz-form-label [nzSm]="6" [nzXs]="24">Autor</nz-form-label>
                    <nz-form-control [nzSm]="14" [nzXs]="24" >
                    <input nz-input [disabled]="true" id="email" class="registroproyecto"/>
                  </nz-form-control>
                  </nz-form-item>   
                  
                <nz-form-item>
                    <nz-form-label [nzSm]="6" [nzXs]="24">Director</nz-form-label>
                    <nz-form-control [nzSm]="14" [nzXs]="24" >
                    <input nz-input [disabled]="true" id="email" class="registroproyecto"/>
                  </nz-form-control>
                </nz-form-item>
                         

                </form>
            </div>

          <div class="segunda" nz-col [nzSpan]="12">
            <form nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()">

                <nz-form-item>
                    <nz-form-label [nzSm]="6" [nzXs]="24">Estado</nz-form-label>
                    <nz-form-control [nzSm]="14" [nzXs]="24" >
                    <input nz-input [disabled]="true" id="email" class="registroproyecto"/>
                  </nz-form-control>
                </nz-form-item>

                <nz-form-item>
                    <nz-form-label [nzSm]="6" [nzXs]="24">Autor</nz-form-label>
                    <nz-form-control [nzSm]="14" [nzXs]="24" >
                    <input nz-input [disabled]="true" id="email" class="registroproyecto"/>
                  </nz-form-control>
                  </nz-form-item>   

                <nz-form-item>
                    <nz-form-label [nzSm]="6" [nzXs]="24">Codirector</nz-form-label>
                    <nz-form-control [nzSm]="14" [nzXs]="24" >
                    <input nz-input [disabled]="true" id="email" class="registroproyecto"/>
                  </nz-form-control>
                </nz-form-item>
            </form>
            
            </div>
        </div>
    </div>
    
    <nz-divider nzText="Nota y observción" nzOrientation="left"></nz-divider>
    <div class="columna">
        <div  nz-row [nzGutter]="8" >
          <div class="primera" nz-col [nzSpan]="12">
            <form nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()">
            
                  
                <nz-form-item class="note">
                    <nz-form-label [nzSm]="6" [nzXs]="24">Valoración</nz-form-label>
                    <nz-form-control [nzSm]="14" [nzXs]="24" >
                    <input  nz-input id="email" class="inputd"/>
                  </nz-form-control>
                </nz-form-item>
                         

                </form>
            </div>

          <div class="segunda" nz-col [nzSpan]="12">
            <form nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()">
                <nz-form-item>
                    <nz-form-label [nzSm]="6" [nzXs]="24">Categoria</nz-form-label>
                    <nz-form-control [nzSm]="14" [nzXs]="24" >
                    <input nz-input [disabled]="true" id="email" class="inputd2"/>
                  </nz-form-control>
                </nz-form-item>
            </form>
            
            </div>
        </div>
        <h3>Observaciones:</h3>

        <textarea rows="4" nz-input [(ngModel)]="inputValue"></textarea> 
    </div>

    <br />

    <button nz-button nzType="primary">Guardar</button>

   
</div>
